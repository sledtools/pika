  nightly-apple-host-bundle:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'nightly')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: apple-host-bundle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nixbuild/nix-quick-install-action@v30

      - name: Load Apple mini CI env
        id: apple_env
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          PIKA_SHELL_QUIET: "1"
        run: nix develop .#default -c ./scripts/write-pikaci-apple-github-env

      - name: Join Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ steps.apple_env.outputs.tailscale_authkey }}
          hostname: gha-pikaci-apple-${{ github.run_id }}
          ping: ${{ steps.apple_env.outputs.ssh_host }}

      - name: Run mini-owned Apple bundle
        id: remote
        run: |
          if [ -z "${PIKACI_APPLE_SSH_HOST:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_HOST after loading .github/pikaci-apple.env" >&2
            exit 2
          fi
          if [ -z "${PIKACI_APPLE_SSH_USER:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_USER after loading .github/pikaci-apple.env" >&2
            exit 2
          fi
          if [ -z "${PIKACI_APPLE_SSH_KEY:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_KEY after decrypting secrets/pikaci-apple.env.age" >&2
            exit 2
          fi

          eval "$(ssh-agent -s)"
          trap 'ssh-agent -k >/dev/null 2>&1 || true' EXIT
          ssh-add - <<<"$PIKACI_APPLE_SSH_KEY"

          checked_out_ref="$(git rev-parse HEAD)"
          echo "checked_out_ref=$checked_out_ref" >> "$GITHUB_OUTPUT"

          ./scripts/pikaci-apple-remote.sh run \
            --ref "$checked_out_ref" \
            --just-recipe apple-host-bundle \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload Apple host debug bundle
        if: always() && steps.remote.outputs.artifact_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: apple-host-bundle-${{ github.run_id }}
          path: ${{ steps.remote.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Summarize Apple host bundle
        if: always()
        run: |
          {
            echo "- command: \`./scripts/pikaci-apple-remote.sh run --ref ${{ steps.remote.outputs.checked_out_ref || 'unknown' }} --just-recipe apple-host-bundle\`"
            echo "- ssh target: \`${{ env.PIKACI_APPLE_SSH_USER || 'unset' }}@${{ env.PIKACI_APPLE_SSH_HOST || 'unset' }}\`"
            echo "- remote root: \`${{ env.PIKACI_APPLE_REMOTE_ROOT || '.cache/pikaci-apple' }}\`"
            echo "- run id: \`${{ steps.remote.outputs.run_id || 'none' }}\`"
            echo "- resolved commit: \`${{ steps.remote.outputs.resolved_commit || 'none' }}\`"
            echo "- remote run dir: \`${{ steps.remote.outputs.remote_run_dir || 'none' }}\`"
            echo "- remote prepared dir: \`${{ steps.remote.outputs.remote_prepared_dir || 'none' }}\`"
            echo "- local artifact dir: \`${{ steps.remote.outputs.artifact_dir || 'none' }}\`"
            echo "- prepared probe: \`${{ steps.remote.outputs.prepared_probe || 'unknown' }}\`"
            echo "- upload skipped: \`${{ steps.remote.outputs.upload_skipped || 'unknown' }}\`"
            echo "- prepare status: \`${{ steps.remote.outputs.prepare_status || 'unknown' }}\`"
            echo "- prepare duration sec: \`${{ steps.remote.outputs.prepare_duration_sec || 'unknown' }}\`"
            echo "- bundle duration sec: \`${{ steps.remote.outputs.bundle_duration_sec || 'unknown' }}\`"
            echo "- remote exit: \`${{ steps.remote.outputs.remote_exit || 'unknown' }}\`"
            echo "- artifact fetch exit: \`${{ steps.remote.outputs.artifact_fetch_exit || 'unknown' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  nightly:
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'nightly'))
    needs: [nightly-linux, nightly-pika, nightly-pikachat, nightly-pika-ui-android, nightly-apple-host-bundle]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check nightly results
        id: check
        run: |
          failed=""
          if [[ "${{ needs.nightly-linux.result }}" != "success" ]]; then
            echo "nightly-linux failed"
            failed="${failed}- **nightly-linux**: ${{ needs.nightly-linux.result }}\n"
          fi
          if [[ "${{ needs.nightly-pika.result }}" != "success" ]]; then
            echo "nightly-pika failed"
            failed="${failed}- **nightly-pika**: ${{ needs.nightly-pika.result }}\n"
          fi
          if [[ "${{ needs.nightly-pikachat.result }}" != "success" ]]; then
            echo "nightly-pikachat failed"
            failed="${failed}- **nightly-pikachat**: ${{ needs.nightly-pikachat.result }}\n"
          fi
          if [[ "${{ needs.nightly-pika-ui-android.result }}" != "success" ]]; then
            echo "nightly-pika-ui-android failed"
            failed="${failed}- **nightly-pika-ui-android**: ${{ needs.nightly-pika-ui-android.result }}\n"
          fi
          if [[ "${{ needs.nightly-apple-host-bundle.result }}" != "success" ]]; then
            echo "nightly-apple-host-bundle failed"
            failed="${failed}- **nightly-apple-host-bundle**: ${{ needs.nightly-apple-host-bundle.result }}\n"
          fi
          if [[ -n "$failed" ]]; then
            {
              echo "failed<<EOF"
              echo -e "$failed"
              echo "EOF"
              echo "has_failures=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on failure
        if: steps.check.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip creating a duplicate if an open nightly-failure issue already exists
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "nightly-failure" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          date=$(date -u +%Y-%m-%d)

          if [[ -n "$existing" ]]; then
            # Append a comment to the existing issue instead of opening a new one
            gh issue comment "$existing" \
              --repo "${{ github.repository }}" \
              --body "### Nightly still failing — ${date}

          ${{ steps.check.outputs.failed }}
          [Run log](${run_url})"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Nightly failure — ${date}" \
              --label "nightly-failure" \
              --body "## Nightly CI failed

          ${{ steps.check.outputs.failed }}
          **Run:** ${run_url}

          This issue was auto-opened by CI. It will stop receiving comments once all nightly lanes pass again."
          fi

      - name: Fail the job
        if: steps.check.outputs.has_failures == 'true'
        run: exit 1
