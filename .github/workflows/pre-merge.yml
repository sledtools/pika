              "${{ needs.check-pikachat-openclaw-e2e.result }}" \
              "${{ needs.check-pikachat-openclaw-e2e.outputs.result }}" \
              "${{ needs.check-pikachat-openclaw-e2e.outputs.run_status }}" \
              "${{ needs.check-pikachat-openclaw-e2e.outputs.run_duration_seconds }}" \
              "${{ needs.check-pikachat-openclaw-e2e.outputs.run_id }}"
            lane_row \
              "pre-merge-fixture-rust" \
              "${{ needs.check-fixture.result }}" \
