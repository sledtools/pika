            echo
            echo "### Linux CI Policy"
            echo
            echo "- Linux <code>pikaci</code> lanes are now authoritative for required Linux CI."
            echo "- Required Linux lanes now run through the staged remote <code>microvm.nix</code> path on <code>pika-build</code>."
            echo "- Trusted GitHub actors run PR-head Linux jobs automatically; everyone else goes through the <code>ci-approval</code> environment."
          } >> "$GITHUB_STEP_SUMMARY"

  check-pikachat-openclaw-e2e:
    name: check-pikachat-openclaw-e2e (pikaci)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.pikachat_openclaw_e2e == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    environment:
      name: ${{ contains(fromJSON('["justinmoon","futurepaul","AnthonyRonning","benthecarman","clarkmoody"]'), github.actor) == false && 'ci-approval' || 'ci-auto' }}
    outputs:
      result: ${{ steps.lane.outputs.result }}
      exit_code: ${{ steps.lane.outputs.exit_code }}
      run_id: ${{ steps.metadata.outputs.run_id }}
      run_status: ${{ steps.metadata.outputs.run_status }}
      run_duration_seconds: ${{ steps.metadata.outputs.run_duration_seconds }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-${{ github.event_name == 'pull_request_target' && 'pr-head' || 'trusted' }}-nix-v1-${{ runner.os }}
          path: /nix
      - name: Fix /nix ownership
        run: |
          if [ -d /nix ] && [ "$(stat -c %u /nix)" != "$(id -u)" ]; then
            sudo chown -R "$(id -u):$(id -g)" /nix
          fi
      - uses: nixbuild/nix-quick-install-action@v30

      - name: Run OpenClaw E2E lane
        id: lane
        env:
          PIKA_BUILD_SSH_KEY: ${{ secrets.PIKA_BUILD_SSH_KEY }}
          PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST: ${{ vars.PIKA_BUILD_SSH_HOST }}
        run: |
          set +e
          exit_code=0
          previous_run_id="$(
            find .pikaci/runs -mindepth 1 -maxdepth 1 -type d -exec basename {} \; 2>/dev/null \
              | LC_ALL=C sort -r \
              | head -n1 \
              || true
          )"
          previous_run_created_at=""
          if [ -n "$previous_run_id" ] && [ -f ".pikaci/runs/$previous_run_id/run.json" ]; then
            previous_run_created_at="$(
              python3 -c 'import json, pathlib, sys; run = json.loads(pathlib.Path(".pikaci/runs", sys.argv[1], "run.json").read_text()); print(run.get("created_at", ""))' "$previous_run_id"
            )"
          fi

          if [ -z "${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST:-}" ]; then
            echo "error: set repository variable PIKA_BUILD_SSH_HOST for check-pikachat-openclaw-e2e" >&2
            exit_code=2
          elif [ -z "${PIKA_BUILD_SSH_KEY:-}" ]; then
            echo "error: set repository secret PIKA_BUILD_SSH_KEY for check-pikachat-openclaw-e2e" >&2
            exit_code=2
          else
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            host="${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST#*@}"
            ./scripts/ci-add-known-host.sh "$host"

            eval "$(ssh-agent -s)"
            trap 'ssh-agent -k >/dev/null 2>&1 || true' EXIT
            ssh-add - <<<"$PIKA_BUILD_SSH_KEY"

            ./scripts/pikaci-staged-linux-remote.sh run pre-merge-pikachat-openclaw-e2e
            exit_code=$?
          fi

          if [ "$exit_code" -eq 0 ]; then
            result=success
          else
            result=failure
            echo "::error::check-pikachat-openclaw-e2e failed with exit code $exit_code"
          fi

          {
            echo "result=$result"
            echo "exit_code=$exit_code"
            echo "previous_run_id=$previous_run_id"
            echo "previous_run_created_at=$previous_run_created_at"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect lane metadata
        if: always()
        id: metadata
        run: |
          python3 scripts/pikaci-run-summary.py \
            --target-id pre-merge-pikachat-openclaw-e2e \
            --min-created-at-exclusive "${{ steps.lane.outputs.previous_run_created_at }}" \
            --allow-missing \
            --github-output "$GITHUB_OUTPUT" \
            --markdown-out "$RUNNER_TEMP/pikaci-run-summary.md" \
            --artifact-dir "$RUNNER_TEMP/pikaci-run-artifact"

      - name: Upload lane debug bundle
        if: always() && steps.metadata.outputs.run_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ runner.temp }}/pikaci-run-artifact
          if-no-files-found: error

      - name: Summarize lane
        if: always()
        run: |
          {
            echo "- command: \`./scripts/pikaci-staged-linux-remote.sh run pre-merge-pikachat-openclaw-e2e\`"
            echo "- result: \`${{ steps.lane.outputs.result }}\`"
            echo "- exit code: \`${{ steps.lane.outputs.exit_code }}\`"
            echo "- host: \`${{ vars.PIKA_BUILD_SSH_HOST || 'unset' }}\`"
            echo "- artifact: \`${{ steps.metadata.outputs.artifact_name || 'none' }}\`"
            echo ""
            cat "$RUNNER_TEMP/pikaci-run-summary.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce lane result
        if: always() && steps.lane.outputs.result != 'success'
        run: exit 1

