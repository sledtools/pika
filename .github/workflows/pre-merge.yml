name: pre-merge

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Which lane to run"
        type: choice
        options:
          - pre-merge
          - nightly
        default: pre-merge

jobs:
  detect-changes:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge')
    runs-on: ubuntu-latest
    outputs:
      pika: ${{ steps.filter.outputs.pika || 'true' }}
      pikachat: ${{ steps.filter.outputs.pikachat || 'true' }}
      pikachat_openclaw_e2e: ${{ steps.filter.outputs.pikachat_openclaw_e2e || 'true' }}
      agent_contracts: ${{ steps.filter.outputs.agent_contracts || 'true' }}
      rmp: ${{ steps.filter.outputs.rmp || 'true' }}
      notifications: ${{ steps.filter.outputs.notifications || 'true' }}
      fixture: ${{ steps.filter.outputs.fixture || 'true' }}
    steps:
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            pika:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - '.github/**'
              - 'rust/**'
              - 'cli/**'
              - 'crates/pika-desktop/**'
              - 'crates/pika-media/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-nse/**'
              - 'crates/pika-relay-profiles/**'
              - 'crates/pika-tls/**'
              - 'uniffi-bindgen/**'
              - 'android/**'
              - 'ios/**'
              - 'docs/**'
              - 'scripts/**'
              - 'tools/**'
            pikachat:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'cmd/pika-relay/**'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - 'just/checks.just'
              - '.github/workflows/pre-merge.yml'
              - 'cli/**'
              - 'crates/pikaci/**'
              - 'crates/pika-agent-control-plane/**'
              - 'crates/pika-desktop/**'
              - 'crates/pika-agent-protocol/**'
              - 'crates/hypernote-protocol/**'
              - 'crates/pikahut/**'
              - 'crates/pikachat-sidecar/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-test-utils/**'
              - 'crates/pika-relay-profiles/**'
              - 'pikachat-openclaw/**'
              - 'crates/pika-media/**'
              - 'crates/pika-tls/**'
              - 'rust/**'
            pikachat_openclaw_e2e:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - '.github/workflows/pre-merge.yml'
              - 'cli/**'
              - 'crates/pikahut/**'
              - 'crates/pikachat-sidecar/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-relay-profiles/**'
              - 'crates/pika-media/**'
              - 'crates/pika-tls/**'
              - 'tools/**'
              - 'pikachat-openclaw/openclaw/extensions/pikachat-openclaw/**'
            agent_contracts:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'cli/**'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - 'just/checks.just'
              - 'just/infra.just'
              - '.github/workflows/pre-merge.yml'
              - 'scripts/pikaci-staged-linux-remote.sh'
              - 'crates/pikaci/**'
              - 'crates/pika-agent-control-plane/**'
              - 'crates/pika-agent-protocol/**'
              - 'crates/pika-agent-microvm/**'
              - 'crates/pika-server/**'
              - 'crates/hypernote-protocol/**'
              - 'crates/pika-media/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-relay-profiles/**'
              - 'crates/pika-test-utils/**'
              - 'crates/pika-tls/**'
              - 'crates/pika-desktop/**'
              - 'crates/pikahut/Cargo.toml'
              - 'crates/pikahut/src/**'
              - 'crates/pikahut/tests/**'
              - 'crates/pikachat-sidecar/**'
              - 'rust/**'
              - 'docs/agent-ci.md'
            rmp:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - '.github/workflows/pre-merge.yml'
              - 'crates/rmp-cli/**'
            notifications:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - 'just/checks.just'
              - 'just/infra.just'
              - '.github/workflows/pre-merge.yml'
              - 'scripts/pikaci-staged-linux-remote.sh'
              - 'crates/pikaci/**'
              - 'crates/pika-agent-control-plane/**'
              - 'crates/pika-agent-microvm/**'
              - 'crates/pika-desktop/**'
              - 'crates/pikahut/**'
              - 'crates/pika-server/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-relay-profiles/**'
              - 'crates/pika-test-utils/**'
              - 'crates/pika-tls/**'
            fixture:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'justfile'
              - 'just/agent.just'
              - 'just/checks.just'
              - 'just/infra.just'
              - '.github/workflows/pre-merge.yml'
              - 'docs/testing/ci-selectors.md'
              - 'docs/testing/integration-matrix.md'
              - 'docs/testing/wrapper-deprecation-policy.md'
              - 'cli/Cargo.toml'
              - 'crates/pikaci/**'
              - 'crates/hypernote-protocol/**'
              - 'crates/pika-agent-control-plane/**'
              - 'crates/pika-agent-microvm/Cargo.toml'
              - 'crates/pika-desktop/**'
              - 'crates/pikahut/**'
              - 'crates/pika-marmot-runtime/**'
              - 'crates/pika-media/**'
              - 'crates/pikachat-sidecar/Cargo.toml'
              - 'crates/pika-relay-profiles/**'
              - 'crates/pika-server/Cargo.toml'
              - 'crates/pika-tls/**'
              - 'pikachat-openclaw/scripts/run-openclaw-e2e.sh'
              - 'pikachat-openclaw/scripts/run-scenario.sh'
              - 'cmd/pika-relay/**'
              - 'rust/**'
              - 'rust/tests/e2e_calls.rs'
              - 'scripts/agent-chat-demo.sh'
              - 'scripts/agent-demo.sh'
              - 'scripts/demo-agent-microvm.sh'
              - 'tools/cli-smoke'
              - 'tools/interop-rust-baseline'
              - 'tools/primal-ios-interop-nightly'
              - 'tools/ui-e2e-local'
              - 'tools/ui-e2e-public'

  check-pika:
    name: check-pika-followup (pikaci)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.pika == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-nix-v1-${{ runner.os }}
          path: /nix
      - name: Fix /nix ownership
        run: |
          if [ -d /nix ] && [ "$(stat -c %u /nix)" != "$(id -u)" ]; then
            sudo chown -R "$(id -u):$(id -g)" /nix
          fi
      - uses: nixbuild/nix-quick-install-action@v30

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-home-v1-${{ runner.os }}
          path: ~/.cargo
      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-target-v1-${{ runner.os }}
          path: target

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-gradle-v1-${{ runner.os }}
          path: ~/.gradle

      - run: nix develop .#default -c just pre-merge-pika-followup

  shadow-pikaci-pre-merge-pika-rust:
    name: check-pika-rust (pikaci)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.pika == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    outputs:
      result: ${{ steps.shadow.outputs.result }}
      exit_code: ${{ steps.shadow.outputs.exit_code }}
      run_id: ${{ steps.metadata.outputs.run_id }}
      run_status: ${{ steps.metadata.outputs.run_status }}
      run_duration_seconds: ${{ steps.metadata.outputs.run_duration_seconds }}
    steps:
      - uses: actions/checkout@v4

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-nix-v1-${{ runner.os }}
          path: /nix
      - name: Fix /nix ownership
        run: |
          if [ -d /nix ] && [ "$(stat -c %u /nix)" != "$(id -u)" ]; then
            sudo chown -R "$(id -u):$(id -g)" /nix
          fi
      - uses: nixbuild/nix-quick-install-action@v30

      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-home-v1-${{ runner.os }}
          path: ~/.cargo
      - uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-target-v1-${{ runner.os }}
          path: target

      - name: Run advisory staged Linux Rust shadow lane
        id: shadow
        env:
          PIKA_BUILD_SSH_KEY: ${{ secrets.PIKA_BUILD_SSH_KEY }}
          PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST: ${{ vars.PIKA_BUILD_SSH_HOST }}
        run: |
          set +e
          exit_code=0
          previous_run_id="$(
            find .pikaci/runs -mindepth 1 -maxdepth 1 -type d -exec basename {} \; 2>/dev/null \
              | LC_ALL=C sort -r \
              | head -n1 \
              || true
          )"
          previous_run_created_at=""
          if [ -n "$previous_run_id" ] && [ -f ".pikaci/runs/$previous_run_id/run.json" ]; then
            previous_run_created_at="$(
              python3 -c 'import json, pathlib, sys; run = json.loads(pathlib.Path(".pikaci/runs", sys.argv[1], "run.json").read_text()); print(run.get("created_at", ""))' "$previous_run_id"
            )"
          fi

          if [ -z "${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST:-}" ]; then
            echo "error: set repository variable PIKA_BUILD_SSH_HOST for the staged Linux Rust shadow lane" >&2
            exit_code=2
          elif [ -z "${PIKA_BUILD_SSH_KEY:-}" ]; then
            echo "error: set repository secret PIKA_BUILD_SSH_KEY for the staged Linux Rust shadow lane" >&2
            exit_code=2
          else
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            host="${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST#*@}"
            ssh-keyscan -H "$host" >> "$HOME/.ssh/known_hosts"
            chmod 600 "$HOME/.ssh/known_hosts"

            eval "$(ssh-agent -s)"
            trap 'ssh-agent -k >/dev/null 2>&1 || true' EXIT
            ssh-add - <<<"$PIKA_BUILD_SSH_KEY"

            nix develop .#default -c just pre-merge-pika-rust-shadow
            exit_code=$?
          fi

          if [ "$exit_code" -eq 0 ]; then
            result=success
          else
            result=failure
            echo "::warning::Advisory staged Linux Rust shadow lane failed with exit code $exit_code"
          fi

          {
            echo "result=$result"
            echo "exit_code=$exit_code"
            echo "previous_run_id=$previous_run_id"
            echo "previous_run_created_at=$previous_run_created_at"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect shadow lane metadata
        if: always()
        id: metadata
        run: |
          python3 scripts/pikaci-shadow-summary.py \
            --target-id pre-merge-pika-rust \
            --min-created-at-exclusive "${{ steps.shadow.outputs.previous_run_created_at }}" \
            --allow-missing \
            --github-output "$GITHUB_OUTPUT" \
            --markdown-out "$RUNNER_TEMP/pikaci-shadow-summary.md" \
            --artifact-dir "$RUNNER_TEMP/pikaci-shadow-artifact"

      - name: Upload shadow lane debug bundle
        if: always() && steps.metadata.outputs.run_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ runner.temp }}/pikaci-shadow-artifact
          if-no-files-found: error

      - name: Summarize shadow lane
        if: always()
        run: |
          {
            echo "- command: \`nix develop .#default -c just pre-merge-pika-rust-shadow\`"
            echo "- result: \`${{ steps.shadow.outputs.result }}\`"
            echo "- exit code: \`${{ steps.shadow.outputs.exit_code }}\`"
            echo "- host: \`${{ vars.PIKA_BUILD_SSH_HOST || 'unset' }}\`"
            echo "- artifact: \`${{ steps.metadata.outputs.artifact_name || 'none' }}\`"
            echo ""
            cat "$RUNNER_TEMP/pikaci-shadow-summary.md"
          } >> "$GITHUB_STEP_SUMMARY"

