name: pre-merge

on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Which shadow suite to run"
        type: choice
        options:
          - pre-merge
          - nightly
        default: pre-merge

permissions:
  contents: read
  pull-requests: read

jobs:
  select-branch:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix || '[]' }}
      selected_count: ${{ steps.select.outputs.selected_count || '0' }}
      selected_titles: ${{ steps.select.outputs.selected_titles }}
      changed_paths: ${{ steps.select.outputs.changed_paths }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Select branch shadow lanes
        id: select
        env:
          FORGE_GITHUB_CI_REPO_ROOT: ${{ github.event_name == 'pull_request' && format('{0}/pr', github.workspace) || github.workspace }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" select \
              --mode branch \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}" \
              --compare-repo-root "$GITHUB_WORKSPACE" \
              --head-repo-root "$GITHUB_WORKSPACE/pr" \
              --github-output "$GITHUB_OUTPUT"
          else
            python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" select \
              --mode branch \
              --all \
              --github-output "$GITHUB_OUTPUT"
          fi

  branch-lanes:
    if: needs.select-branch.outputs.selected_count != '0'
    needs: [select-branch]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    concurrency:
      group: ${{ format('{0}-{1}', github.repository, matrix.concurrency_group) }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-branch.outputs.matrix) }}
    env:
      SHADOW_REPO_ROOT: ${{ github.event_name == 'pull_request' && format('{0}/pr', github.workspace) || github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v4
        if: matrix.needs_openclaw_checkout && github.event_name == 'pull_request'
        with:
          repository: openclaw/openclaw
          path: pr/openclaw

      - uses: actions/checkout@v4
        if: matrix.needs_openclaw_checkout && github.event_name != 'pull_request'
        with:
          repository: openclaw/openclaw
          path: openclaw

      - uses: nixbuild/nix-quick-install-action@v30

      - name: Setup staged Linux SSH
        if: matrix.uses_staged_linux
        env:
          PIKA_BUILD_SSH_KEY: ${{ secrets.PIKA_BUILD_SSH_KEY }}
          PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST: ${{ vars.PIKA_BUILD_SSH_HOST }}
        run: |
          if [[ -z "${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST:-}" ]]; then
            echo "error: set repository variable PIKA_BUILD_SSH_HOST for staged Linux shadow lanes" >&2
            exit 2
          fi
          if [[ -z "${PIKA_BUILD_SSH_KEY:-}" ]]; then
            echo "error: set repository secret PIKA_BUILD_SSH_KEY for staged Linux shadow lanes" >&2
            exit 2
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          host="${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST#*@}"
          "$GITHUB_WORKSPACE/scripts/ci-add-known-host.sh" "$host"
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<<"$PIKA_BUILD_SSH_KEY"

      - name: Install repo secret tools for Apple remote shadow lanes
        if: matrix.uses_apple_remote
        run: nix --extra-experimental-features 'nix-command flakes' profile install nixpkgs#age nixpkgs#sops

      - name: Join Tailscale for Apple remote shadow lanes
        if: matrix.uses_apple_remote
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          "$GITHUB_WORKSPACE/scripts/with-pikaci-apple-ci-env" --secret-set tailscale \
            "$GITHUB_WORKSPACE/scripts/pikaci-apple-github-step" tailscale-up \
              --hostname "gha-pikaci-shadow-${{ github.run_id }}"

      - name: Run branch shadow lane
        if: ${{ !matrix.uses_apple_remote }}
        env:
          FORGE_GITHUB_CI_REPO_ROOT: ${{ env.SHADOW_REPO_ROOT }}
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" run \
            --mode branch \
            --lane-id "${{ matrix.id }}"

      - name: Run Apple remote branch shadow lane
        if: matrix.uses_apple_remote
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
          FORGE_GITHUB_CI_REPO_ROOT: ${{ env.SHADOW_REPO_ROOT }}
        run: |
          "$GITHUB_WORKSPACE/scripts/with-pikaci-apple-ci-env" --secret-set ssh \
            python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" run \
              --mode branch \
              --lane-id "${{ matrix.id }}"

      - name: Summarize branch shadow lane
        if: always()
        run: |
          {
            echo "### ${{ matrix.title }}"
            echo
            echo "- command: \`${{ matrix.command_shell }}\`"
            echo "- canonical forge: \`git.pikachat.org\` remains authoritative; this workflow is advisory shadow CI."
          } >> "$GITHUB_STEP_SUMMARY"

  pre-merge:
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge'))
    needs: [select-branch, branch-lanes]
    runs-on: ubuntu-latest
    name: check-pika
    steps:
      - name: Summarize branch shadow suite
        run: |
          {
            echo "## Branch Shadow CI"
            echo
            echo "- selected lanes: \`${{ needs.select-branch.outputs.selected_count }}\`"
            echo "- selected titles:"
            if [[ -n "${{ needs.select-branch.outputs.selected_titles }}" ]]; then
              printf '%s\n' "${{ needs.select-branch.outputs.selected_titles }}"
            else
              echo "none"
            fi
            echo
            echo "Canonical pre-merge CI runs on \`git.pikachat.org\` via forge + pikaci."
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.branch-lanes.result }}" == "failure" ]]; then
            exit 1
          fi

  select-nightly:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'nightly')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix || '[]' }}
      selected_count: ${{ steps.select.outputs.selected_count || '0' }}
      selected_titles: ${{ steps.select.outputs.selected_titles }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select nightly shadow lanes
        id: select
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" select \
            --mode nightly \
            --all \
            --github-output "$GITHUB_OUTPUT"

  nightly-lanes:
    if: needs.select-nightly.outputs.selected_count != '0'
    needs: [select-nightly]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    concurrency:
      group: ${{ format('{0}-{1}', github.repository, matrix.concurrency_group) }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-nightly.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v4
        if: matrix.needs_openclaw_checkout
        with:
          repository: openclaw/openclaw
          path: openclaw

      - uses: nixbuild/nix-quick-install-action@v30

      - name: Setup staged Linux SSH
        if: matrix.uses_staged_linux
        env:
          PIKA_BUILD_SSH_KEY: ${{ secrets.PIKA_BUILD_SSH_KEY }}
          PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST: ${{ vars.PIKA_BUILD_SSH_HOST }}
        run: |
          if [[ -z "${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST:-}" || -z "${PIKA_BUILD_SSH_KEY:-}" ]]; then
            echo "error: staged Linux nightly shadow requires PIKA_BUILD_SSH_HOST and PIKA_BUILD_SSH_KEY" >&2
            exit 2
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          host="${PIKACI_PREPARED_OUTPUT_FULFILL_SSH_HOST#*@}"
          ./scripts/ci-add-known-host.sh "$host"
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<<"$PIKA_BUILD_SSH_KEY"

      - name: Install repo secret tools for Apple remote shadow lanes
        if: matrix.uses_apple_remote
        run: nix --extra-experimental-features 'nix-command flakes' profile install nixpkgs#age nixpkgs#sops

      - name: Join Tailscale for Apple remote shadow lanes
        if: matrix.uses_apple_remote
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          ./scripts/with-pikaci-apple-ci-env --secret-set tailscale \
            ./scripts/pikaci-apple-github-step tailscale-up \
              --hostname "gha-pikaci-nightly-shadow-${{ github.run_id }}"

      - name: Run nightly shadow lane
        if: ${{ !matrix.uses_apple_remote }}
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" run \
            --mode nightly \
            --lane-id "${{ matrix.id }}"

      - name: Run Apple remote nightly shadow lane
        if: matrix.uses_apple_remote
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          ./scripts/with-pikaci-apple-ci-env --secret-set ssh \
            python3 "$GITHUB_WORKSPACE/scripts/forge-github-ci-shim.py" run \
              --mode nightly \
              --lane-id "${{ matrix.id }}"

  nightly:
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'nightly'))
    needs: [select-nightly, nightly-lanes]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize nightly shadow suite
        run: |
          {
            echo "## Nightly Shadow CI"
            echo
            echo "- selected lanes: \`${{ needs.select-nightly.outputs.selected_count }}\`"
            echo "- selected titles:"
            if [[ -n "${{ needs.select-nightly.outputs.selected_titles }}" ]]; then
              printf '%s\n' "${{ needs.select-nightly.outputs.selected_titles }}"
            else
              echo "none"
            fi
            echo
            echo "Canonical nightly CI runs on \`git.pikachat.org\` via forge + pikaci."
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.nightly-lanes.result }}" == "failure" ]]; then
            exit 1
          fi
