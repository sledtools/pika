  pre-merge:
    if: always() && (github.event_name == 'pull_request_target' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge'))
    needs:
      - detect-changes
      - check-pika
      - check-pika-rust
      - check-pikachat
      - check-pikachat-openclaw-e2e
      - check-agent-contracts
      - check-rmp
      - check-notifications
      - check-fixture
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate lane results
        run: |
          failed=""
          echo "detect-changes outputs:"
          echo "  pika=${{ needs.detect-changes.outputs.pika }}"
          echo "  pikachat=${{ needs.detect-changes.outputs.pikachat }}"
          echo "  pikachat_openclaw_e2e=${{ needs.detect-changes.outputs.pikachat_openclaw_e2e }}"
          echo "  agent_contracts=${{ needs.detect-changes.outputs.agent_contracts }}"
          echo "  rmp=${{ needs.detect-changes.outputs.rmp }}"
          echo "  notifications=${{ needs.detect-changes.outputs.notifications }}"
          echo "  fixture=${{ needs.detect-changes.outputs.fixture }}"

          check_required_job() {
            local label="$1"
            local changed="$2"
            local result="$3"

            if [[ "$changed" != "true" ]]; then
              echo "$label: skipped (unchanged)"
            elif [[ "$result" == "success" ]]; then
              echo "$label: success (ok)"
            else
              echo "$label: $result (FAILED)"
              failed="${failed}${label} "
            fi
          }

          echo "Required Linux pre-merge lanes:"
          check_required_job "check-pika-followup" "${{ needs.detect-changes.outputs.pika }}" "${{ needs.check-pika.result }}"
          check_required_job "check-pika-rust" "${{ needs.detect-changes.outputs.pika }}" "${{ needs.check-pika-rust.result }}"
          check_required_job "check-pikachat" "${{ needs.detect-changes.outputs.pikachat }}" "${{ needs.check-pikachat.result }}"
          check_required_job "check-pikachat-openclaw-e2e" "${{ needs.detect-changes.outputs.pikachat_openclaw_e2e }}" "${{ needs.check-pikachat-openclaw-e2e.result }}"
          check_required_job "check-agent-contracts" "${{ needs.detect-changes.outputs.agent_contracts }}" "${{ needs.check-agent-contracts.result }}"
          check_required_job "check-rmp" "${{ needs.detect-changes.outputs.rmp }}" "${{ needs.check-rmp.result }}"
          check_required_job "check-notifications" "${{ needs.detect-changes.outputs.notifications }}" "${{ needs.check-notifications.result }}"
          check_required_job "check-fixture" "${{ needs.detect-changes.outputs.fixture }}" "${{ needs.check-fixture.result }}"

          echo "Non-blocking lanes:"
          echo "nightly-* jobs remain non-blocking and run only on schedule/manual nightly mode."

          if [[ -n "$failed" ]]; then
            echo "::error::Failed lanes: $failed"
            exit 1
          fi

  nightly-linux:
