  summarize-pikaci-shadow-lanes:
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge'))
    needs:
      - shadow-pikaci-pre-merge-pika-rust
      - shadow-pikaci-pre-merge-notifications
      - shadow-pikaci-pre-merge-agent-contracts
      - shadow-pikaci-pre-merge-rmp
      - shadow-pikaci-pre-merge-pikachat-rust
    runs-on: ubuntu-latest
    steps:
      - name: Summarize pikaci Linux lanes
        run: |
          lane_row() {
            local label="$1"
            local job_state="$2"
            local advisory_result="$3"
            local run_status="$4"
            local duration="$5"
            local run_id="$6"

            if [[ "$job_state" == "skipped" ]]; then
              advisory_result="not_triggered"
            elif [[ -z "$advisory_result" ]]; then
              advisory_result="unavailable"
            fi

            if [[ -z "$run_status" ]]; then
              run_status="none"
            fi

            if [[ -z "$duration" ]]; then
              duration="unknown"
            else
              duration="${duration}s"
            fi

            if [[ -z "$run_id" ]]; then
              run_id="none"
            fi

            printf "| <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> |\n" \
              "$label" "$job_state" "$advisory_result" "$run_status" "$duration" "$run_id"
          }

          {
            echo "## Pikaci Linux lanes"
            echo
            echo "| lane | workflow job | pikaci result | pikaci run status | duration | run id |"
            echo "| --- | --- | --- | --- | --- | --- |"
            lane_row \
              "pre-merge-pika-rust" \
              "${{ needs.shadow-pikaci-pre-merge-pika-rust.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-pika-rust.outputs.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-pika-rust.outputs.run_status }}" \
              "${{ needs.shadow-pikaci-pre-merge-pika-rust.outputs.run_duration_seconds }}" \
              "${{ needs.shadow-pikaci-pre-merge-pika-rust.outputs.run_id }}"
            lane_row \
              "pre-merge-notifications" \
              "${{ needs.shadow-pikaci-pre-merge-notifications.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-notifications.outputs.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-notifications.outputs.run_status }}" \
              "${{ needs.shadow-pikaci-pre-merge-notifications.outputs.run_duration_seconds }}" \
              "${{ needs.shadow-pikaci-pre-merge-notifications.outputs.run_id }}"
            lane_row \
              "pre-merge-agent-contracts" \
              "${{ needs.shadow-pikaci-pre-merge-agent-contracts.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-agent-contracts.outputs.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-agent-contracts.outputs.run_status }}" \
              "${{ needs.shadow-pikaci-pre-merge-agent-contracts.outputs.run_duration_seconds }}" \
              "${{ needs.shadow-pikaci-pre-merge-agent-contracts.outputs.run_id }}"
            lane_row \
              "pre-merge-rmp" \
              "${{ needs.shadow-pikaci-pre-merge-rmp.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-rmp.outputs.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-rmp.outputs.run_status }}" \
              "${{ needs.shadow-pikaci-pre-merge-rmp.outputs.run_duration_seconds }}" \
              "${{ needs.shadow-pikaci-pre-merge-rmp.outputs.run_id }}"
            lane_row \
              "pre-merge-pikachat-rust" \
              "${{ needs.shadow-pikaci-pre-merge-pikachat-rust.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-pikachat-rust.outputs.result }}" \
              "${{ needs.shadow-pikaci-pre-merge-pikachat-rust.outputs.run_status }}" \
              "${{ needs.shadow-pikaci-pre-merge-pikachat-rust.outputs.run_duration_seconds }}" \
              "${{ needs.shadow-pikaci-pre-merge-pikachat-rust.outputs.run_id }}"
            echo
            echo "### Linux CI Policy"
            echo
            echo "- All required Linux pre-merge families now gate through <code>pikaci</code>."
            echo "- Legacy Linux GitHub jobs remain advisory only while we watch parity and flake rate."
          } >> "$GITHUB_STEP_SUMMARY"

