  check-apple-host-sanity:
    name: check-apple-host-sanity
    needs: [detect-changes]
    if: needs.detect-changes.outputs.pikachat == 'true' && (github.event_name == 'pull_request_target' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: apple-host-sanity
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: nixbuild/nix-quick-install-action@v30

      - name: Load Apple mini CI env
        id: apple_env
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          PIKA_SHELL_QUIET: "1"
        run: nix develop .#default -c ./scripts/write-pikaci-apple-github-env

      - name: Join Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ steps.apple_env.outputs.tailscale_authkey }}
          hostname: gha-pikaci-apple-sanity-${{ github.run_id }}
          ping: ${{ steps.apple_env.outputs.ssh_host }}

      - name: Run Apple host sanity bundle
        id: remote
        run: |
          if [ -z "${PIKACI_APPLE_SSH_HOST:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_HOST after loading .github/pikaci-apple.env" >&2
            exit 2
          fi
          if [ -z "${PIKACI_APPLE_SSH_USER:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_USER after loading .github/pikaci-apple.env" >&2
            exit 2
          fi
          if [ -z "${PIKACI_APPLE_SSH_KEY:-}" ]; then
            echo "error: missing PIKACI_APPLE_SSH_KEY after decrypting secrets/pikaci-apple.env.age" >&2
            exit 2
          fi

          eval "$(ssh-agent -s)"
          trap 'ssh-agent -k >/dev/null 2>&1 || true' EXIT
          ssh-add - <<<"$PIKACI_APPLE_SSH_KEY"

          checked_out_ref="$(git rev-parse HEAD)"
          echo "checked_out_ref=$checked_out_ref" >> "$GITHUB_OUTPUT"

          ./scripts/pikaci-apple-remote.sh run \
            --ref "$checked_out_ref" \
            --just-recipe apple-host-sanity \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload Apple host sanity debug bundle
        if: always() && steps.remote.outputs.artifact_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: apple-host-sanity-${{ github.run_id }}
          path: ${{ steps.remote.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Summarize Apple host sanity bundle
        if: always()
        run: |
          {
            echo "- command: \`./scripts/pikaci-apple-remote.sh run --ref ${{ steps.remote.outputs.checked_out_ref || 'unknown' }} --just-recipe apple-host-sanity\`"
            echo "- ssh target: \`${{ env.PIKACI_APPLE_SSH_USER || 'unset' }}@${{ env.PIKACI_APPLE_SSH_HOST || 'unset' }}\`"
            echo "- remote root: \`${{ env.PIKACI_APPLE_REMOTE_ROOT || '.cache/pikaci-apple' }}\`"
            echo "- run id: \`${{ steps.remote.outputs.run_id || 'none' }}\`"
            echo "- resolved commit: \`${{ steps.remote.outputs.resolved_commit || 'none' }}\`"
            echo "- remote run dir: \`${{ steps.remote.outputs.remote_run_dir || 'none' }}\`"
            echo "- remote prepared dir: \`${{ steps.remote.outputs.remote_prepared_dir || 'none' }}\`"
            echo "- local artifact dir: \`${{ steps.remote.outputs.artifact_dir || 'none' }}\`"
            echo "- prepared probe: \`${{ steps.remote.outputs.prepared_probe || 'unknown' }}\`"
            echo "- upload skipped: \`${{ steps.remote.outputs.upload_skipped || 'unknown' }}\`"
            echo "- prepare status: \`${{ steps.remote.outputs.prepare_status || 'unknown' }}\`"
            echo "- prepare duration sec: \`${{ steps.remote.outputs.prepare_duration_sec || 'unknown' }}\`"
            echo "- bundle duration sec: \`${{ steps.remote.outputs.bundle_duration_sec || 'unknown' }}\`"
            echo "- remote exit: \`${{ steps.remote.outputs.remote_exit || 'unknown' }}\`"
            echo "- artifact fetch exit: \`${{ steps.remote.outputs.artifact_fetch_exit || 'unknown' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  summarize-pikaci-linux-lanes:
    if: always() && (github.event_name == 'pull_request_target' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pre-merge'))
    needs:
      - check-pika
      - check-pika-rust
      - check-notifications
      - check-agent-contracts
      - check-rmp
      - check-pikachat
      - check-pikachat-openclaw-e2e
      - check-fixture
    runs-on: ubuntu-latest
    steps:
      - name: Summarize pikaci Linux lanes
        run: |
          lane_row() {
            local label="$1"
            local job_state="$2"
            local lane_result="$3"
            local run_status="$4"
            local duration="$5"
            local run_id="$6"

            if [[ "$job_state" == "skipped" ]]; then
              lane_result="not_triggered"
            elif [[ -z "$lane_result" ]]; then
              lane_result="unavailable"
            fi

            if [[ -z "$run_status" ]]; then
              run_status="none"
            fi

            if [[ -z "$duration" ]]; then
              duration="unknown"
            else
              duration="${duration}s"
            fi

            if [[ -z "$run_id" ]]; then
              run_id="none"
            fi

            printf "| <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> | <code>%s</code> |\n" \
              "$label" "$job_state" "$lane_result" "$run_status" "$duration" "$run_id"
          }

          {
            echo "## Authoritative Linux Pikaci Lanes"
            echo
            echo "| lane | workflow job | lane result | pikaci run status | duration | run id |"
            echo "| --- | --- | --- | --- | --- | --- |"
            lane_row \
              "pre-merge-pika-followup" \
              "${{ needs.check-pika.result }}" \
              "${{ needs.check-pika.outputs.result }}" \
              "${{ needs.check-pika.outputs.run_status }}" \
              "${{ needs.check-pika.outputs.run_duration_seconds }}" \
              "${{ needs.check-pika.outputs.run_id }}"
            lane_row \
              "pre-merge-pika-rust" \
              "${{ needs.check-pika-rust.result }}" \
              "${{ needs.check-pika-rust.outputs.result }}" \
              "${{ needs.check-pika-rust.outputs.run_status }}" \
              "${{ needs.check-pika-rust.outputs.run_duration_seconds }}" \
              "${{ needs.check-pika-rust.outputs.run_id }}"
            lane_row \
              "pre-merge-notifications" \
              "${{ needs.check-notifications.result }}" \
              "${{ needs.check-notifications.outputs.result }}" \
              "${{ needs.check-notifications.outputs.run_status }}" \
              "${{ needs.check-notifications.outputs.run_duration_seconds }}" \
              "${{ needs.check-notifications.outputs.run_id }}"
            lane_row \
              "pre-merge-agent-contracts" \
              "${{ needs.check-agent-contracts.result }}" \
              "${{ needs.check-agent-contracts.outputs.result }}" \
              "${{ needs.check-agent-contracts.outputs.run_status }}" \
              "${{ needs.check-agent-contracts.outputs.run_duration_seconds }}" \
              "${{ needs.check-agent-contracts.outputs.run_id }}"
            lane_row \
              "pre-merge-rmp" \
              "${{ needs.check-rmp.result }}" \
              "${{ needs.check-rmp.outputs.result }}" \
              "${{ needs.check-rmp.outputs.run_status }}" \
