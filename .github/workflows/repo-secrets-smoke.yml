name: repo-secrets-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-repo-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nixbuild/nix-quick-install-action@v30

      - name: Install repo secret tools
        run: nix --extra-experimental-features 'nix-command flakes' profile install nixpkgs#age nixpkgs#sops

      - name: Check repo secret files
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: ./scripts/check-repo-secret-files

      - name: Run helper tests
        run: python3 scripts/test_sops_secret_helpers.py
