version = 1
name = "pika-project-invariants"

[[invariant]]
id = "PIKACI-001"
area = "pikaci"
kind = "allowed"
statement = "jerichoci may depend on pika-cloud, and pikaci may depend on jerichoci."
scope = [
  "crates/jerichoci/**",
  "crates/pikaci/**",
  "crates/pika-git/**",
]

[[invariant]]
id = "PIKACI-002"
area = "pikaci"
kind = "must"
statement = "The reusable CI engine lives in crates/jerichoci/** and does not define the Pika staged-lane catalog, target catalog, or forge target-selection table. Those Pika-specific catalogs live in crates/pikaci/**."
scope = [
  "crates/jerichoci/**",
  "crates/pikaci/**",
]
hint = "Focus on whether production jerichoci modules define Pika-specific target IDs or staged-lane tables. Ignore #[cfg(test)] fixture catalogs even if they use similar names for test coverage. It is fine for jerichoci to expose generic command helpers and executor machinery."

[[invariant]]
id = "PIKACI-003"
area = "pikaci"
kind = "must"
statement = "For forge branch lanes, branch-lane path-filter policy has a single source of truth in ci/forge-lanes.toml. pikaci may define local-only targets and may map staged targets to local CLI entries, but it must not duplicate forge branch-lane path filters."
scope = [
  "crates/jerichoci/**",
  "crates/pikaci/**",
  "ci/**",
  "crates/pika-git/**",
]
hint = "Look specifically for duplicated branch-lane path filters between ci/forge-lanes.toml, pika-git manifest loading, and pikaci target selection. Do not fail this invariant just because pikaci has a local catalog of staged targets."

[[invariant]]
id = "PIKACI-004"
area = "pikaci"
kind = "must"
statement = "jerichoci models execution placement separately from runtime backend. Production code does not choose host vs Incus vs Tart execution from job IDs, tart-* prefixes, or guest-command shape; those choices come from explicit JobSpec fields."
scope = [
  "crates/jerichoci/**",
]
hint = "Focus on JobSpec, planner records, and executor dispatch. It is fine for backend-specific command compilation or cache behavior to depend on explicit job fields. Fail only if production code still chooses the runtime backend from naming conventions or command-shape heuristics."

[[invariant]]
id = "PIKACI-005"
area = "pikaci"
kind = "must"
statement = "Backend-specific setup lives in explicit runtime config data, not ad hoc top-level JobSpec fields. Production jerichoci code should carry staged Linux command config, Tart host setup, and similar backend knobs under runtime-specific config."
scope = [
  "crates/jerichoci/**",
  "crates/pikaci/**",
]
hint = "Focus on the JobSpec data model and how main.rs builds jobs. It is fine for helper methods to read backend-specific settings from a runtime config enum. Fail if production JobSpec still has loose top-level fields like staged_linux_command, host_setup_command, or mount_host_rust_toolchain."

[[invariant]]
id = "PIKACI-006"
area = "pikaci"
kind = "must"
statement = "crates/pikaci/** is a Pika-specific frontend layer on top of jerichoci. It may define catalogs, path filters, and CLI commands, but generic run/executor/snapshot core modules live in crates/jerichoci/**."
scope = [
  "crates/jerichoci/**",
  "crates/pikaci/**",
]
hint = "Look for generic CI engine modules being reintroduced under crates/pikaci/src, such as reusable run records, executor backends, snapshotting, or lifecycle core logic."
